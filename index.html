<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>心理学 復習アプリ｜看護学生のための復習アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="app">

  <main class="main">

    <!-- ===== ホーム画面 ===== -->
    <section id="screenHome" class="screen">

      <div class="hero-banner">
        <h1 class="hero-banner-title">心理学 復習アプリ</h1>
        <p class="hero-banner-sub">全85問・ランダム出題・解説つき</p>
      </div>

      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-box-num" id="statAnswered">0</div>
          <div class="stat-box-label">取り組み済み</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-num" id="statCorrect">0</div>
          <div class="stat-box-label">正解数</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-num" id="statAccuracy">—</div>
          <div class="stat-box-label">正答率</div>
        </div>
      </div>

      <div class="progress-box">
        <div class="progress-box-top">
          <span>全問進捗</span>
          <span id="progressText">0 / 85問</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
      </div>

      <button class="bookmark-banner" id="btnStartBookmark">
        <span class="bookmark-banner-star">⭐</span>
        <span class="bookmark-banner-text">保存した問題</span>
        <span class="bookmark-banner-count" id="bookmarkCountText">0問</span>
      </button>

      <h2 class="section-heading">問題セットを選ぶ</h2>
      <div class="set-select-list">
        <button class="set-select-item is-selected" id="btnSetAll" data-set="all">
          <div class="set-select-icon">🎲</div>
          <div class="set-select-body">
            <div class="set-select-title">ランダム出題</div>
            <div class="set-select-desc">全85問からまんべんなく出題</div>
          </div>
        </button>
        <button class="set-select-item" id="btnSetWrong" data-set="wrong">
          <div class="set-select-icon">🔁</div>
          <div class="set-select-body">
            <div class="set-select-title">苦手問題だけ</div>
            <div class="set-select-desc">まだ正解していない問題のみ</div>
          </div>
        </button>
        <button class="set-select-item" id="btnSetByRound" data-set="round">
          <div class="set-select-icon">📚</div>
          <div class="set-select-body">
            <div class="set-select-title">回ごとに選ぶ</div>
            <div class="set-select-desc">第1回〜第14回から選択</div>
          </div>
        </button>
      </div>

      <h2 class="section-heading">問題数を選んでください</h2>
      <div class="count-grid" id="homeCountGrid"></div>

      <button class="start-button" id="btnHomeStart" disabled>問題セットを選んでください</button>

      <h2 class="section-heading">回ごとの進捗</h2>
      <div id="roundProgressList" class="round-progress-list"></div>

      <div class="reset-row">
        <button id="btnReset" class="btn-text-danger">進捗をリセット</button>
      </div>
    </section>

    <!-- ===== 回選択画面 ===== -->
    <section id="screenRoundSelect" class="screen" hidden>
      <div class="subheader">
        <button class="btn-back" id="btnBackFromRoundSelect">← ホームへ</button>
        <h2 class="subheader-title">出題する回を選ぶ</h2>
      </div>
      <div id="roundSelectList" class="round-select-list"></div>
    </section>

    <!-- ===== クイズ画面 ===== -->
    <section id="screenQuiz" class="screen" hidden>
      <div class="quiz-topline">
        <button class="btn-back" id="btnQuitQuiz">← 中断してホームへ</button>
        <div class="quiz-progress-text"><span id="quizIndex">1</span> / <span id="quizTotal">10</span></div>
      </div>
      <div class="quiz-progress-track">
        <div class="quiz-progress-fill" id="quizProgressFill"></div>
      </div>

      <div class="quiz-card" id="quizCard">
        <div class="quiz-card-meta">
          <span class="round-badge" id="quizRoundBadge">第1回</span>
          <button class="bookmark-btn" id="quizBookmarkBtn" aria-label="ブックマーク">
            <svg class="bm-icon" viewBox="0 0 24 24"><path d="M6 3a2 2 0 0 0-2 2v16l8-5 8 5V5a2 2 0 0 0-2-2H6z"/></svg>
          </button>
        </div>
        <p class="quiz-question" id="quizQuestion">問題文がここに表示されます</p>

        <div class="choice-list" id="choiceList"></div>

        <div class="feedback-panel" id="feedbackPanel" hidden>
          <div class="feedback-badge" id="feedbackBadge">正解！</div>
          <p class="feedback-explain" id="feedbackExplain"></p>
          <button class="btn-next" id="btnNext">次の問題へ →</button>
        </div>
      </div>
    </section>

    <!-- ===== 結果画面 ===== -->
    <section id="screenResult" class="screen" hidden>
      <div class="result-card">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <h2 class="result-title" id="resultTitle">お疲れさま！</h2>
        <div class="result-score" id="resultScore">8 / 10</div>
        <p class="result-comment" id="resultComment">よくできました。</p>
        <div class="result-buttons">
          <button class="btn-primary" id="btnRetrySame">同じ範囲でもう一度</button>
          <button class="btn-secondary" id="btnBackHome">ホームへ戻る</button>
        </div>
      </div>

      <h2 class="section-heading">解答一覧（タップで解説を表示）</h2>
      <div id="resultReviewList" class="result-review-list"></div>
    </section>

  </main>

  <footer class="app-footer">
    <p>心理学講義 復習用クイズ｜全85問｜本番の小テストとは別の自主学習教材です</p>
  </footer>

</div>

<script src="questions.js?v=2"></script>
<script src="app.js?v=2"></script>
</body>
</html>
